name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Only the "dev" extra is installed here (not "webrtc"). aiortc pulls in
          # native/build dependencies (e.g. aiortc, av, cryptography) that are prone
          # to flaky or slow builds on some OS/Python combinations in CI. The test
          # suite is hermetic and skips WebRTC-specific tests when aiortc isn't
          # installed, so this keeps the full OS x Python matrix fast and green.
          # WebRTC code paths are exercised separately by the test-webrtc job below.
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q --cov=ipycam

  test-webrtc:
    name: Test WebRTC extra (ubuntu-latest, Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,webrtc]"

      - name: Run tests
        run: pytest -q --cov=ipycam

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      # Non-blocking for now: ruff configuration is being introduced separately
      # and the existing codebase hasn't been brought in line with it yet.
      # Remove continue-on-error once the codebase is clean.
      - name: Run ruff
        run: ruff check ipycam
        continue-on-error: true

  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mypy
        run: pip install mypy

      # Non-blocking for now, same rationale as the lint job: mypy config/type
      # coverage is being introduced separately. Remove continue-on-error once
      # the codebase passes cleanly.
      - name: Run mypy
        run: mypy ipycam
        continue-on-error: true
